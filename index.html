function xlsxDateToIso(val) {
  if (!val) return '';
  if (val instanceof Date) {
    return isoDate(new Date(Date.UTC(val.getFullYear(), val.getMonth(), val.getDate())));
  }
  if (typeof val === 'number') {
    const d = XLSX.SSF.parse_date_code(val);
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  // Already a string like YYYY-MM-DD or DD/MM/YYYY
  if (/^\d{4}-\d{2}-\d{2}$/.test(String(val))) return val;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(String(val))) {
    const [d,m,y] = String(val).split('/');
    return `${y}-${m}-${d}`;
  }
  return String(val);
}

function downloadSample() {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded. Please check your internet connection and try again.'); return; }
  const wb = XLSX.utils.book_new();

  const propRows = [
    ['Name','Location','Listing Link','Week Start (DD/MM/YYYY)','Week End (DD/MM/YYYY)','W/C (DD/MM/YYYY)','Bedrooms','Bathrooms','Total Price (£)','Notes'],
    ['Seaview House','Portsmouth','https://airbnb.com/rooms/example','05/01/2026','09/01/2026','05/01/2026',4,2,1200,'Parking available'],
    ['City Apartment','Manchester','','12/01/2026','16/01/2026','12/01/2026',2,1,800,''],
  ];
  const roomRows = [
    ['Property Name','Room Name','Room Type'],
    ['Seaview House','Master bedroom','master'],
    ['Seaview House','Room 2','king'],
    ['Seaview House','Room 3','double'],
    ['Seaview House','Sofa bed','sofa-bed'],
    ['City Apartment','Room A','queen'],
    ['City Apartment','Room B','twin'],
  ];

  const wsProps = XLSX.utils.aoa_to_sheet(propRows);
  wsProps['!cols'] = [20,18,35,22,22,22,10,10,16,25].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, wsProps, 'Properties');

  const wsRooms = XLSX.utils.aoa_to_sheet(roomRows);
  wsRooms['!cols'] = [20,20,15].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, wsRooms, 'Rooms');

  XLSX.writeFile(wb, 'accommodation_sample.xlsx');
}

function importExcel(file) {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded. Please check your internet connection and try again.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb    = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const wsProp = wb.Sheets['Properties'];
      const wsRoom = wb.Sheets['Rooms'];
      if (!wsProp) { alert('Could not find a sheet named "Properties". Please use the sample file as a template.'); return; }

      const propRows = XLSX.utils.sheet_to_json(wsProp, { defval: '' });
      const roomRows = wsRoom ? XLSX.utils.sheet_to_json(wsRoom, { defval: '' }) : [];
      const validTypes = ROOM_TYPES.map(r => r.v);
      const errors = [];

      // Build room lookup: property name -> [rooms]
      const roomsByProp = {};
      roomRows.forEach((r, i) => {
        const pname = String(r['Property Name'] || '').trim();
        const rname = String(r['Room Name'] || '').trim();
        const rtype = String(r['Room Type'] || '').trim().toLowerCase();
        if (!pname || !rname) { errors.push(`Rooms row ${i+2}: missing Property Name or Room Name — skipped`); return; }
        const resolvedType = validTypes.includes(rtype) ? rtype : 'double';
        if (!validTypes.includes(rtype)) errors.push(`Rooms row ${i+2}: unknown type "${rtype}" — defaulted to double`);
        if (!roomsByProp[pname]) roomsByProp[pname] = [];
        roomsByProp[pname].push({ id: uid(), name: rname, type: resolvedType });
      });

      const imported = [];
      propRows.forEach((r, i) => {
        const name = String(r['Name'] || '').trim();
        if (!name) { errors.push(`Properties row ${i+2}: missing Name — skipped`); return; }
        const ws = xlsxDateToIso(r['Week Start (DD/MM/YYYY)'] || r['Week Start'] || '');
        const we = xlsxDateToIso(r['Week End (DD/MM/YYYY)']   || r['Week End']   || '');
        const wc = xlsxDateToIso(r['W/C (DD/MM/YYYY)']        || r['W/C']        || '') || (ws ? getMonday(ws) : '');
        if (!ws || !we) errors.push(`Properties row ${i+2}: "${name}" missing Week Start or Week End`);
        imported.push({
          id:         uid(),
          name,
          location:   String(r['Location'] || '').trim(),
          listingLink:(s => s && !/^https?:\/\//i.test(s) ? 'https://'+s : s)(String(r['Listing Link'] || '').trim()),
          wc,
          weekStart:  ws,
          weekEnd:    we,
          bedrooms:   parseInt(r['Bedrooms'])  || 0,
          bathrooms:  parseInt(r['Bathrooms']) || 0,
          totalPrice: parseFloat(String(r['Total Price (£)'] || r['Total Price'] || '0').replace(/[^0-9.]/g,'')) || 0,
          notes:      String(r['Notes'] || '').trim(),
          rooms:      roomsByProp[name] || [],
        });
      });

      if (!imported.length) { alert('No valid properties found in the file.'); return; }
      F.importData = imported;
      set({ modal: { type: 'import-confirm', data: { propCount: imported.length, roomCount: imported.reduce((s,p)=>s+p.rooms.length,0), errors } } });
    } catch(err) {
      alert('Could not read file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Event handling ────────────────────────────────────────────────────────────

function listen() {
  const app = document.getElementById('app');
  app.addEventListener('click',  onClick);
  app.addEventListener('change', onChange);
  document.getElementById('xlsx-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importExcel(file);
  });
}

function onClick(e) {
  const el = e.target.closest('[data-a]');
  if (!el) return;
  const a = el.dataset.a;

  switch (a) {
    case 'landing':      set({ view: 'landing', memberId: null }); break;
    case 'go-member':    set({ view: 'member',  memberId: null }); break;
    case 'go-organiser': set({ view: 'organiser' }); break;
    case 'org-login': {
      const pw = document.getElementById('org-pw')?.value;
      if (pw === 'admin') { orgAuthed = true; render(); }
      else { const err = document.getElementById('org-pw-err'); if (err) err.style.display = 'block'; }
      break;
    }
    case 'change-mem':   set({ memberId: null }); break;

    case 'confirm-mem': {
      const v = document.getElementById('mem-sel')?.value;
      if (v) set({ memberId: v, memAddMode: false });
      break;
    }

    case 'toggle-add-self': set({ memAddMode: !S.memAddMode }); break;

    case 'add-self': {
      const name = document.getElementById('self-name')?.value?.trim();
      if (!name) { alert('Please enter your name.'); return; }
      const email = document.getElementById('self-email')?.value?.trim();
      const id = uid();
      set({
        members: [...S.members, { id, name, email }],
        memberId: id,
        memAddMode: false,
      });
      break;
    }

    case 'mem-tab': set({ memTab: el.dataset.tab, ...(el.dataset.tab === 'available' ? { memExpandedWcs: [] } : {}) }); break;
    case 'cal-prev': {
      const [y, mo] = (S.memCalYM || isoDate(new Date()).slice(0,7)).split('-').map(Number);
      set({ memCalYM: mo === 1 ? `${y-1}-12` : `${y}-${String(mo-1).padStart(2,'0')}` });
      break;
    }
    case 'cal-next': {
      const [y, mo] = (S.memCalYM || isoDate(new Date()).slice(0,7)).split('-').map(Number);
      set({ memCalYM: mo === 12 ? `${y+1}-01` : `${y}-${String(mo+1).padStart(2,'0')}` });
      break;
    }
    case 'org-tab':   set({ orgTab: el.dataset.tab }); break;
    case 'prop-view': set({ propView: el.dataset.view, orgWcExpanded: [] }); break;
    case 'org-prop-toggle-wc': {
      const wc  = el.dataset.wc;
      const cur = S.orgWcExpanded || [];
      set({ orgWcExpanded: cur.includes(wc) ? cur.filter(x => x !== wc) : [...cur, wc] });
      break;
    }

    case 'toggle-prop': set({ expanded: S.expanded === el.dataset.pid ? null : el.dataset.pid }); break;
    case 'toggle-budget-wk': set({ expandedBudgetWk: S.expandedBudgetWk === el.dataset.wc ? null : el.dataset.wc }); break;
    case 'mem-toggle-wc': {
      const wc  = el.dataset.wc;
      const all = weeks().map(w => w.wc);
      const cur = S.memExpandedWcs === null ? all : S.memExpandedWcs;
      const next = cur.includes(wc) ? cur.filter(x => x !== wc) : [...cur, wc];
      set({ memExpandedWcs: next.length === all.length ? null : next });
      break;
    }

    case 'download-sample': downloadSample(); break;
    case 'import-excel':
      document.getElementById('xlsx-input').value = '';
      document.getElementById('xlsx-input').click();
      break;
    case 'import-replace':
      if (F.importData) { set({ properties: F.importData, bookings: [], modal: null }); F.importData = null; }
      break;
    case 'import-merge':
      if (F.importData) { set({ properties: [...S.properties, ...F.importData], modal: null }); F.importData = null; }
      break;
    case 'open-add-prop':  F = { rooms: [] }; set({ modal: { type: 'add-prop',  data: {} } }); break;
    case 'open-edit-prop': { const p = prop(el.dataset.pid); F = { rooms: p ? JSON.parse(JSON.stringify(p.rooms)) : [] }; set({ modal: { type: 'edit-prop', data: { p } } }); break; }
    case 'dup-prop': {
      const p = prop(el.dataset.pid); if (!p) break;
      const copy = { ...p, id: uid(), name: p.name + ' (copy)', rooms: p.rooms.map(r => ({ ...r, id: uid() })) };
      set({ properties: [...S.properties, copy] });
      break;
    }
    case 'del-prop': delProp(el.dataset.pid); break;

    case 'add-room': {
      syncRooms();
      F.rooms.push({ id: uid(), name: '', type: 'double' });
      refreshRooms();
      break;
    }
    case 'rm-room': {
      syncRooms();
      F.rooms.splice(parseInt(el.dataset.i), 1);
      refreshRooms();
      break;
    }

    case 'save-add-prop': { const d = collectProp(); if (d) { addProp(d); set({ modal: null }); } break; }
    case 'save-edit-prop': { const d = collectProp(); if (d) { updProp(el.dataset.pid, d); set({ modal: null }); } break; }

    case 'open-add-mem':  F = {}; set({ modal: { type: 'add-mem',  data: {} } }); break;
    case 'open-edit-mem': { const m = mem(el.dataset.mid); F = {}; set({ modal: { type: 'edit-mem', data: { m } } }); break; }
    case 'del-mem': delMem(el.dataset.mid); break;

    case 'save-add-mem': {
      const name = document.getElementById('m-name')?.value?.trim();
      const email = document.getElementById('m-email')?.value?.trim();
      if (!name) { alert('Please enter a name.'); return; }
      addMem({ name, email }); set({ modal: null }); break;
    }
    case 'save-edit-mem': {
      const name = document.getElementById('m-name')?.value?.trim();
      const email = document.getElementById('m-email')?.value?.trim();
      if (!name) { alert('Please enter a name.'); return; }
      updMem(el.dataset.mid, { name, email }); set({ modal: null }); break;
    }

    case 'open-signup': F = { roomId: null }; set({ modal: { type: 'signup', data: { pid: el.dataset.pid } } }); break;
    case 'sel-room': {
      if (!el.classList.contains('rs-full')) {
        F.roomId = el.dataset.rid;
        document.querySelectorAll('.rs-item').forEach(x => x.classList.toggle('rs-sel', x.dataset.rid === F.roomId));
        const btn = document.querySelector('[data-a="confirm-signup"]');
        if (btn) btn.disabled = false;
      }
      break;
    }
    case 'confirm-signup': {
      if (!F.roomId) break;
      book(S.memberId, el.dataset.pid, F.roomId);
      set({ modal: null, memTab: 'bookings' });
      break;
    }

    case 'add-to-cal': downloadIcs(el.dataset.bid); break;
    case 'unbook': unbook(el.dataset.bid); break;

    case 'open-rate': set({ modal: { type: 'rate-stay', data: { bookingId: el.dataset.bid } } }); break;

    case 'save-rate': {
      const b = S.bookings.find(x => x.id === el.dataset.bid);
      if (!b) break;
      const raterId = b.memberId;

      const readStars = name => {
        const w = document.querySelector(`.modal .stars[data-name="${name}"]`);
        return w ? +w.dataset.val || 0 : 0;
      };
      const readComment = id => (document.getElementById(id)?.value || '').trim();

      let propRatings = S.propertyRatings;
      const propScore = readStars('prop');
      const propComment = readComment('rate-comment-prop');
      if (propScore > 0) {
        propRatings = upsertRating(propRatings, ['propertyId', 'raterId'], {
          propertyId: b.propertyId, raterId, score: propScore, comment: propComment,
        });
      }

      let memberRatings = S.memberRatings;
      propBookings(b.propertyId)
        .filter(x => x.memberId !== raterId)
        .forEach(x => {
          const score = readStars('mem-' + x.memberId);
          const comment = readComment('rate-comment-mem-' + x.memberId);
          if (score > 0) {
            memberRatings = upsertRating(memberRatings, ['subjectId', 'raterId'], {
              subjectId: x.memberId, raterId, score, comment,
            });
          }
        });

      set({ propertyRatings: propRatings, memberRatings, modal: null });
      break;
    }

    case 'quick-book': {
      const { pid, rid } = el.dataset;
      const p = prop(pid); if (!p) break;
      // Remove any existing booking the member has at this property's week
      const wc = propWc(p);
      const existingThisWk = S.bookings.find(b =>
        b.memberId === S.memberId && S.properties.some(q => propWc(q) === wc && q.id === b.propertyId)
      );
      if (existingThisWk) {
        const existProp = prop(existingThisWk.propertyId);
        if (!confirm(`Switch from ${existProp?.name || 'your current booking'} to ${p.name}?`)) break;
        unbook(existingThisWk.id);
      }
      book(S.memberId, pid, rid);
      set({ memTab: 'bookings' });
      break;
    }

    case 'send-emails': {
      const p = prop(el.dataset.pid); if (!p) break;
      const bks = propBookings(p.id);
      const emails = bks.map(b => mem(b.memberId)?.email).filter(Boolean);
      if (!emails.length) { alert('No email addresses found for booked members.'); break; }
      const booked = bks.map(b => ({ m: mem(b.memberId), r: p.rooms.find(x=>x.id===b.roomId) })).filter(x=>x.m);
      const body = genEmail(p, booked);
      window.open(`mailto:${emails.join(',')}?subject=${encodeURIComponent('Accommodation details — '+p.name)}&body=${encodeURIComponent(body)}`);
      break;
    }

    case 'open-share-setup': set({ modal: { type: 'share-setup' } }); break;

    case 'save-share-setup': {
      const key = sanitizeKey(document.getElementById('sync-key')?.value);
      if (!key) { alert('Please paste your Master Key.'); return; }
      syncCfg.masterKey = key;
      saveSyncCfg();
      set({ modal: null });
      createShareBin().then(id => {
        if (id) set({ modal: { type: 'share-link', data: { url: location.href } } });
      });
      break;
    }

    case 'copy-share': {
      const url = location.href;
      const btn = el;
      const flash = txt => {
        if (!btn) return;
        const old = btn.textContent;
        btn.textContent = txt;
        setTimeout(() => { btn.textContent = old; }, 1200);
      };
      const fallback = () => prompt('Copy this link:', url);
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => flash('Copied!'), fallback);
      } else {
        fallback();
      }
      break;
    }

    case 'close-modal':    set({ modal: null }); break;
    case 'overlay-close':  if (e.target.classList.contains('overlay')) set({ modal: null }); break;
  }
}

function onChange(e) {
  if (e.target.dataset.a === 'assign-room') {
    const { pid, rid } = e.target.dataset;
    const mid = e.target.value;
    let bookings = S.bookings.filter(b => !(b.propertyId === pid && b.roomId === rid));
    if (mid) {
      bookings = bookings.filter(b => !(b.memberId === mid && b.propertyId === pid));
      bookings = [...bookings, { id: uid(), memberId: mid, propertyId: pid, roomId: rid }];
    }
    set({ bookings });
    return;
  }
  if (e.target.dataset.a === 'sel-send-prop') {
    set({ sendPropId: e.target.value });
    return;
  }
  if (e.target.dataset.a === 'budget-wc-filter') {
    set({ budgetWcFilter: e.target.value || null });
    return;
  }
  if (e.target.dataset.a === 'mem-house-wc') {
    set({ memHouseWc: e.target.value || null });
    return;
  }
  // Auto-select W/C from week start date when adding/editing a property
  if (e.target.id === 'p-ws') {
    const wc = document.getElementById('p-wc');
    if (wc && !wc.value) wc.value = getMonday(e.target.value);
    return;
  }
  if (e.target.id === 'p-wc') return;
}

function syncRooms() {
  const names = document.querySelectorAll('.rn');
  const types  = document.querySelectorAll('.rt');
  names.forEach((el, i) => { if (F.rooms[i]) F.rooms[i].name = el.value; });
  types.forEach((el, i) => { if (F.rooms[i]) F.rooms[i].type = el.value; });
}

function refreshRooms() {
  const ed = document.getElementById('rooms-ed');
  if (ed) ed.innerHTML = F.rooms.map((r, i) => reRow(r, i)).join('');
}

function collectProp() {
  syncRooms();
  const name = document.getElementById('p-name')?.value?.trim();
  if (!name) { alert('Please enter a property name.'); return null; }
  const ws = document.getElementById('p-ws')?.value;
  const we = document.getElementById('p-we')?.value;
  if (!ws || !we) { alert('Please enter the week start and end dates.'); return null; }
  const wcRaw = document.getElementById('p-wc')?.value || getMonday(ws);
  return {
    name,
    location:    document.getElementById('p-loc')?.value?.trim()   || '',
    listingLink: (r => r && !/^https?:\/\//i.test(r) ? 'https://' + r : r)(document.getElementById('p-link')?.value?.trim()),
    wc:          wcRaw,
    weekStart:   ws,
    weekEnd:     we,
    bedrooms:    parseInt(document.getElementById('p-beds')?.value)  || 0,
    bathrooms:   parseInt(document.getElementById('p-baths')?.value) || 0,
    totalPrice:  parseFloat(document.getElementById('p-price')?.value) || 0,
    notes:       document.getElementById('p-notes')?.value?.trim() || '',
    rooms:       F.rooms.map(r => ({ ...r, id: r.id || uid() })),
  };
}

// ── Boot ──────────────────────────────────────────────────────────────────────

initSync();
render();
listen();
</script>
