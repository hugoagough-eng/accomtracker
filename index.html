<!DOCTYPE html>
<!-- ============================================================================
  FILE: index.html
  PURPOSE: BAE Air project accommodation tracker — Newton internal tool.
           Two views: team member (sign up, view bookings) and organiser
           (manage properties, budget, members, send details).
  VERSION: 1.7 | 2026-05-20
  CHANGES:
    v1.0 2026-05-18 -- Initial build. Self-contained single-file app using
                       localStorage for persistence. No server required.
    v1.1 2026-05-19 -- Added shared storage via JSONBin.io. The organiser
                       pastes a Master Key once, gets a share link, and the
                       team's data syncs across browsers (polls every 4s,
                       three-way merge on bookings/properties/members).
    v1.2 2026-05-20 -- Sanitise the pasted JSONBin Master Key (strip
                       non-printable / non-ASCII characters) before use.
                       Fixes a "String contains non ISO-8859-1 code point"
                       fetch() crash when keys were copied via apps that
                       inject smart quotes or zero-width whitespace.
    v1.3 2026-05-20 -- Bake in DEFAULT_BIN_ID and DEFAULT_MASTER_KEY so the
                       whole team lands on the same shared bin without any
                       setup. The share dialog still works for overrides.
    v1.4 2026-05-20 -- Full mobile pass for iPhone Safari: viewport-fit
                       cover with safe-area insets, dvh for full-height
                       containers, 16px inputs to stop focus zoom, 44px
                       touch targets, horizontally-scrolling tabs, modal
                       sheet style on small screens, table overflow scroll,
                       stacked page header, hover-only hover effects.
    v1.5 2026-05-20 -- Per-person colour tints on roommate pills and the
                       Who's-where room chips. Colours are deterministic
                       (hash of name) so the same person always renders in
                       the same colour across views.
    v1.6 2026-05-20 -- Ratings: 1-5 star rating for the property and each
                       housemate per booking, with optional comments.
                       New propertyRatings and memberRatings arrays sync
                       across devices. Organiser gets a Ratings tab
                       showing per-member and per-property averages,
                       counts, and the verbatim comments each rater left.
    v1.7 2026-05-20 -- Show each booked member's average received rating
                       on the Find accommodation room chips so people can
                       see who they'd be staying with before they book.
  CAVEATS:
    - Email sending opens the local mail client via mailto: links
    - Local fallback: data is stored in browser localStorage under
      'accom_tracker_v1'; sync config under 'accom_tracker_sync_v1'.
    - Share links embed the JSONBin Master Key in the URL fragment, so
      anyone with the link has read/write access to the bin. Use a
      dedicated JSONBin account for this tracker.
    - Modal edits pause polling so remote pulls don't blow away open forms.
============================================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#282D37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>Accommodation tracker — BAE Air</title>
  <style>
    :root {
      --orange:       #FF6223;
      --orange-dark:  #E5541C;
      --orange-tint:  #FFF3EE;
      --slate:        #282D37;
      --slate-mid:    #3D4452;
      --slate-light:  #F0F1F3;
      --bg:           #F5F5F7;
      --white:        #FFFFFF;
      --border:       #E5E5EA;
      --border-strong:#C7C7CC;
      --success:      #1A7F37;
      --success-bg:   #F0FBF3;
      --success-border:#86EFAC;
      --danger:       #D93025;
      --danger-bg:    #FFF2F1;
      --warning:      #C2690A;
      --warning-bg:   #FFFBF0;
      --text:         #1D1D1F;
      --text-muted:   #6E6E73;
      --text-subtle:  #AEAEB2;
      --card-r:       12px;
      --btn-r:        8px;
      --font:         -apple-system, 'SF Pro Text', 'Aptos', 'Segoe UI', system-ui, sans-serif;
      --shadow-xs:    0 1px 2px rgba(0,0,0,0.06);
      --shadow-sm:    0 1px 4px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
      --shadow-md:    0 4px 16px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.05);
      --shadow-lg:    0 24px 56px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
    button, a, [role="button"], [data-a] { -webkit-tap-highlight-color: transparent; }

    /* ── Header ─────────────────────────────────── */
    .hdr { background: var(--slate); height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; padding-left: max(28px, env(safe-area-inset-left)); padding-right: max(28px, env(safe-area-inset-right)); box-shadow: 0 1px 0 rgba(255,255,255,0.07); }
    .hdr-logo { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .hdr-bar { width: 3px; height: 22px; background: var(--orange); border-radius: 2px; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .hdr-role { color: rgba(255,255,255,0.5); font-size: 12px; }
    .sync-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); white-space: nowrap; }
    .sync-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .sync-pill.sync-synced  { color: #86EFAC; }
    .sync-pill.sync-syncing { color: #FCD34D; }
    .sync-pill.sync-offline { color: rgba(255,255,255,0.55); }
    .sync-pill.sync-error   { color: #FCA5A5; }
    .sync-pill.sync-local   { color: rgba(255,255,255,0.55); }
    @keyframes sync-pulse { 50% { opacity: 0.45; } }
    .sync-pill.sync-syncing::before { animation: sync-pulse 1s ease-in-out infinite; }

    /* ── Layout ──────────────────────────────────── */
    .page { max-width: 1080px; margin: 0 auto; padding: 32px 24px; }
    .page-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 12px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--slate); letter-spacing: -0.02em; }
    .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    /* ── Cards ───────────────────────────────────── */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--card-r); padding: 22px 24px; box-shadow: var(--shadow-sm); }
    .card + .card { margin-top: 14px; }
    .card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .card-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Buttons ─────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 9px 18px; border-radius: var(--btn-r); border: none; cursor: pointer; font-size: 13px; font-family: var(--font); font-weight: 500; text-decoration: none; transition: all 0.15s ease; white-space: nowrap; }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--orange-dark); }
    .btn-slate { background: var(--slate); color: #fff; }
    .btn-outline { background: var(--white); color: var(--slate); border: 1px solid var(--border-strong); }
    .btn-outline:hover:not(:disabled) { background: var(--slate-light); }
    .btn-outline-lt { background: transparent; color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.25); }
    .btn-outline-lt:hover:not(:disabled) { background: rgba(255,255,255,0.10); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: none; box-shadow: none; }
    .btn-ghost:hover:not(:disabled) { background: var(--slate-light); color: var(--slate); transform: none; box-shadow: none; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm  { padding: 6px 13px; font-size: 12px; }
    .btn-xs  { padding: 4px 9px; font-size: 11px; border-radius: 6px; }
    a.btn { display: inline-flex; }

    /* ── Tabs ────────────────────────────────────── */
    .tabs { display: flex; border-bottom: 1.5px solid var(--border); margin-bottom: 24px; }
    .tab  { padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1.5px; white-space: nowrap; transition: color 0.12s; }
    .tab:hover { color: var(--slate); }
    .tab.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 600; }

    /* ── Forms ───────────────────────────────────── */
    .fg  { margin-bottom: 16px; }
    .fg:last-child { margin-bottom: 0; }
    .fg label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=text], input[type=email], input[type=number], input[type=url], input[type=date], select, textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--btn-r);
      font-size: 13px; font-family: var(--font); color: var(--text); background: var(--white);
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,98,35,0.14); }
    textarea { resize: vertical; min-height: 64px; }
    .frow   { display: grid; gap: 14px; }
    .frow-2 { grid-template-columns: 1fr 1fr; }
    .frow-3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ── Landing ─────────────────────────────────── */
    .landing { min-height: calc(100vh - 58px); min-height: calc(100dvh - 58px); display: flex; align-items: center; justify-content: center; }
    .landing-inner { text-align: center; max-width: 560px; padding: 32px 24px; }
    .landing-title { font-size: 32px; font-weight: 700; color: var(--slate); margin-bottom: 8px; letter-spacing: -0.03em; }
    .landing-sub { color: var(--text-muted); margin-bottom: 40px; font-size: 15px; line-height: 1.6; }
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .role-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--card-r); padding: 32px 22px; cursor: pointer; text-align: center; transition: all 0.18s ease; box-shadow: var(--shadow-xs); }
    .role-card:hover { border-color: var(--orange); box-shadow: var(--shadow-md); transform: translateY(-3px); }
    .role-icon { font-size: 34px; margin-bottom: 14px; }
    .role-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
    .role-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    /* ── Badges ──────────────────────────────────── */
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .b-orange { background: var(--orange-tint); color: var(--orange); }
    .b-green  { background: var(--success-bg); color: var(--success); }
    .b-grey   { background: #F2F2F7; color: var(--text-muted); }
    .b-red    { background: var(--danger-bg); color: var(--danger); }

    /* ── Property cards ──────────────────────────── */
    .prop-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--card-r); padding: 18px 22px; margin-bottom: 12px; box-shadow: var(--shadow-xs); transition: box-shadow 0.15s, transform 0.15s; }
    .prop-card:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .prop-hdr  { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .prop-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .prop-meta { font-size: 12px; color: var(--text-muted); margin-top: 5px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .prop-meta span::before { content: '·'; margin-right: 10px; color: var(--border-strong); }
    .prop-meta span:first-child::before { content: ''; margin-right: 0; }
    .prop-acts { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; flex-wrap: wrap; }
    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-top: 14px; }
    .room-chip  { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; transition: all 0.12s; }
    .room-chip.avail { border-color: var(--success-border); background: var(--success-bg); }
    .room-chip.avail[data-a] { cursor: pointer; }
    .room-chip.avail[data-a]:hover { border-color: var(--success); box-shadow: 0 0 0 3px rgba(26,127,55,0.12); transform: translateY(-1px); }
    .room-chip.taken { background: #F9F9FB; border-color: var(--border); }
    .room-chip.me    { border-color: var(--success); background: var(--success-bg); border-width: 2px; }
    .rc-name  { font-weight: 600; margin-bottom: 1px; }
    .rc-type  { color: var(--text-muted); font-size: 11px; }
    .rc-who   { font-size: 11px; margin-top: 4px; }
    .rc-who.avail { color: var(--success); font-weight: 500; }
    .rc-who.taken { color: var(--orange); }
    .rc-rating { font-size: 11px; font-weight: 600; color: #B45309; margin-top: 3px; letter-spacing: 0.02em; }

    /* ── Budget ──────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(192px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat { background: var(--white); border: 1px solid var(--border); border-radius: var(--card-r); padding: 18px 20px; box-shadow: var(--shadow-xs); transition: box-shadow 0.15s; }
    .stat:hover { box-shadow: var(--shadow-sm); }
    .stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; font-weight: 600; }
    .stat-val { font-size: 26px; font-weight: 700; color: var(--slate); letter-spacing: -0.03em; line-height: 1.1; }
    .stat-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .prog { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; margin-top: 10px; }
    .prog-fill { height: 100%; background: var(--orange); border-radius: 6px; transition: width 0.5s ease; }
    .prog-fill.pf-green { background: var(--success); }
    .prog-fill.pf-red   { background: #E05555; }
    .wk-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--card-r); padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--shadow-xs); }
    .wk-hdr  { display: flex; align-items: center; justify-content: space-between; }
    .wk-lbl  { font-weight: 600; font-size: 13px; letter-spacing: -0.01em; }
    .wk-meta { font-size: 11px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }

    /* ── Members ─────────────────────────────────── */
    .mem-row  { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .mem-row:last-child { border-bottom: none; }
    .mem-name { font-weight: 500; font-size: 14px; }
    .mem-email { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .mem-booked { font-size: 11px; color: var(--orange); margin-top: 3px; font-weight: 500; }

    /* ── Modal ───────────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.42); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .modal   { background: var(--white); border-radius: 16px; padding: 28px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
    .modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .modal-close { background: #F2F2F7; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; line-height: 1; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.12s; }
    .modal-close:hover { background: var(--border); color: var(--text); }
    .modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }

    /* ── Room editor ─────────────────────────────── */
    .re-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
    .re-row .fg { margin-bottom: 0; flex: 1; }

    /* ── Room selector (member signup) ───────────── */
    .rs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin: 14px 0; }
    .rs-item { border: 1.5px solid var(--border); border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.15s; }
    .rs-item:hover:not(.rs-full) { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,98,35,0.12); }
    .rs-item.rs-sel  { border-color: var(--orange); background: var(--orange-tint); }
    .rs-item.rs-full { opacity: 0.4; cursor: not-allowed; background: #F9F9FB; }
    .rs-name { font-weight: 600; font-size: 13px; }
    .rs-type { font-size: 11px; color: var(--text-muted); }
    .rs-who  { font-size: 11px; color: var(--orange); margin-top: 3px; }

    /* ── Booking card (member) ───────────────────── */
    .info-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 10px; font-size: 13px; }
    .info-lbl { color: var(--text-muted); flex-shrink: 0; min-width: 95px; font-size: 12px; font-weight: 500; }
    .roommates { display: flex; flex-wrap: wrap; gap: 5px; }
    .rtag { background: #F2F2F7; padding: 3px 10px; border-radius: 20px; font-size: 12px; }

    /* ── Stars ───────────────────────────────────── */
    .stars { display: inline-flex; gap: 2px; user-select: none; }
    .stars .star { font-size: 26px; line-height: 1; color: var(--border-strong); cursor: pointer; padding: 4px; transition: color 0.1s, transform 0.1s; }
    .stars .star.on { color: #F59E0B; }
    .stars .star:hover { transform: scale(1.12); }
    .stars.ro .star { cursor: default; pointer-events: none; padding: 0; font-size: 16px; }
    .rate-row { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .rate-row:last-child { border-bottom: none; }
    .rate-row-name { font-weight: 600; font-size: 13px; flex: 1; min-width: 0; }
    .rate-block { padding: 16px 0; border-bottom: 1px solid var(--border); }
    .rate-block:last-of-type { border-bottom: none; }
    .rate-block-hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .rate-comment { width: 100%; min-height: 48px; margin-top: 8px; font-size: 13px; }
    .rating-score { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; font-size: 13px; color: var(--slate); }
    .rating-score .num { font-variant-numeric: tabular-nums; }
    .rating-score .count { color: var(--text-muted); font-weight: 500; font-size: 12px; }
    .rating-comments { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .rating-comment { background: #F9F9FB; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--text); }
    .rating-comment .rc-meta { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

    /* ── Email preview ───────────────────────────── */
    .email-pre { background: #F9F9FB; border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 12px; font-family: 'Courier New', monospace; white-space: pre-wrap; max-height: 320px; overflow-y: auto; }

    /* ── Misc ────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    .empty { text-align: center; padding: 64px 24px; color: var(--text-muted); }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
    .alert-info { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
    .alert-warn { background: var(--warning-bg); color: var(--warning); border: 1px solid #FDE68A; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 14px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .flex  { display: flex; }
    .fb    { display: flex; justify-content: space-between; align-items: center; }
    .g4    { gap: 4px; }
    .g6    { gap: 6px; }
    .g8    { gap: 8px; }
    .g12   { gap: 12px; }
    .mb12  { margin-bottom: 12px; }
    .mb16  { margin-bottom: 16px; }
    .mt8   { margin-top: 8px; }
    .mt12  { margin-top: 12px; }
    .mt16  { margin-top: 16px; }
    .muted { color: var(--text-muted); }
    .sm    { font-size: 12px; }
    .fw6   { font-weight: 600; }
    .sec-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

    /* ── Calendar ───────────────────────────────── */
    .cal-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--card-r); padding: 22px 24px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .cal-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; color: var(--slate); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

    .cal-cell { position: relative; display: flex; align-items: center; justify-content: center; height: 44px; }
    .cal-num { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 13px; position: relative; z-index: 1; color: var(--text); }
    .cal-cell.other-month .cal-num { color: var(--text-subtle); }
    .cal-cell.is-today .cal-num { font-weight: 700; color: var(--orange); }
    .cal-cell.is-today:not(.booked) .cal-num { border: 2px solid var(--orange); }
    .cal-cell.booked .cal-num { background: var(--orange); color: #fff; font-weight: 600; }
    .cal-cell.is-today.booked .cal-num { box-shadow: 0 0 0 3px rgba(255,98,35,0.3); }
    .cal-range { position: absolute; top: 50%; transform: translateY(-50%); height: 34px; background: rgba(255,98,35,0.13); z-index: 0; pointer-events: none; }
    .cal-range.rs { left: 50%; right: 0; }
    .cal-range.re { left: 0; right: 50%; }
    .cal-range.rm { left: 0; right: 0; }
    .cal-bk-list { background: var(--white); border: 1px solid var(--border); border-radius: var(--card-r); padding: 20px 24px; box-shadow: var(--shadow-sm); }
    .cal-bk-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .cal-bk-item:last-child { border-bottom: none; }
    .cal-bk-bar { width: 4px; min-height: 44px; background: var(--orange); border-radius: 2px; flex-shrink: 0; }

    /* Only animate hover on devices with a real cursor (kills sticky-hover on touch) */
    @media (hover: none) {
      .btn:hover:not(:disabled),
      .prop-card:hover,
      .stat:hover,
      .room-chip.avail[data-a]:hover,
      .role-card:hover { transform: none; box-shadow: var(--shadow-xs); }
      .role-card:hover { border-color: var(--border); }
    }

    /* ── Tablet & below ─────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { font-size: 15px; }
      .page { padding: 20px 16px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }
      .hdr { padding: 0 16px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }

      /* Inputs at 16px stop iOS Safari from zooming on focus */
      input[type=text], input[type=email], input[type=number], input[type=url], input[type=date], input[type=password], select, textarea { font-size: 16px; padding: 11px 12px; }

      /* Bigger touch targets */
      .btn { padding: 11px 18px; font-size: 14px; min-height: 44px; }
      .btn-sm { padding: 8px 13px; font-size: 13px; min-height: 36px; }
      .btn-xs { padding: 6px 10px; font-size: 12px; min-height: 30px; }

      /* Horizontally-scrolling tabs */
      .tabs { overflow-x: auto; overflow-y: hidden; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; margin-left: -16px; margin-right: -16px; padding: 0 16px; }
      .tabs::-webkit-scrollbar { display: none; }
      .tab { padding: 12px 16px; flex-shrink: 0; }

      /* Tables get a horizontal scroll wrapper without HTML changes */
      .card > table, .card .table-wrap > table { display: block; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
      th, td { padding: 10px 12px; }

      /* Modals fill more screen, less inner padding, respect dvh for Safari toolbar */
      .overlay { padding: 12px; align-items: flex-end; }
      .modal { padding: 20px; border-radius: 14px; max-height: 92dvh; }
      .modal-foot { flex-wrap: wrap; gap: 10px; }
      .modal-foot .btn { flex: 1 1 auto; min-width: 0; justify-content: center; }

      .frow-2, .frow-3 { grid-template-columns: 1fr; }
      .role-grid { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat { padding: 14px 16px; }
      .stat-val { font-size: 22px; }
      .rooms-grid, .rs-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .room-chip, .rs-item { padding: 12px; min-height: 56px; }

      /* Stack the page header so the action button has room */
      .page-hdr { flex-direction: column; align-items: stretch; gap: 14px; }
      .page-hdr > :last-child:not(:only-child) { align-self: flex-start; }

      .prop-card { padding: 16px; }
      .prop-hdr { flex-direction: column; gap: 10px; }
      .prop-acts { width: 100%; }
      .prop-acts .btn { flex: 1 1 auto; justify-content: center; }

      .card { padding: 18px 16px; }
      .cal-wrap, .cal-bk-list { padding: 16px 14px; }
      .cal-cell { height: 40px; }
      .cal-num { width: 30px; height: 30px; font-size: 12px; }

      .wk-row { padding: 14px 16px; }

      /* Booking info rows wrap onto their own line so values aren't squeezed */
      .info-row { flex-direction: column; gap: 4px; }
      .info-lbl { min-width: 0; }

      .sync-pill { padding: 4px 8px; font-size: 10px; }
      .hdr-role { display: none; }
    }

    /* ── Phone ─────────────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .hdr-logo { font-size: 13px; gap: 8px; }
      .hdr-right { gap: 6px; }
      .page-title { font-size: 19px; }
      .modal { padding: 18px 16px; border-radius: 12px 12px 0 0; max-height: 94dvh; padding-bottom: max(18px, env(safe-area-inset-bottom)); }
      .overlay { padding: 0; align-items: flex-end; }
      .stat-grid { grid-template-columns: 1fr; }
      .rooms-grid, .rs-grid { grid-template-columns: 1fr; }
      .landing-title { font-size: 26px; }
      .landing-sub { font-size: 14px; margin-bottom: 28px; }
      .landing-inner { padding: 24px 16px; }
      .role-card { padding: 24px 20px; }
      .role-icon { font-size: 28px; margin-bottom: 10px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<input type="file" id="xlsx-input" accept=".xlsx,.xls" style="display:none;">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
// ============================================================================
// FILE: index.html (embedded script)
// PURPOSE: State management, rendering, sync, and event handling for the
//          accommodation tracker. localStorage for offline-first persistence;
//          JSONBin.io for cross-device sync via shareable link.
// VERSION: 1.1 | 2026-05-19
// ============================================================================

const STORE_KEY = 'accom_tracker_v1';
const SYNC_BASE = 'https://api.jsonbin.io/v3/b';
const SYNC_LS_KEY = 'accom_tracker_sync_v1';
const SYNC_FIELDS = ['properties', 'members', 'bookings', 'weeklyBudgets', 'propertyRatings', 'memberRatings'];
const POLL_MS = 4000;
const PUSH_DEBOUNCE_MS = 600;

// Baked-in shared bin so the team lands on the same data with no setup.
// Anyone visiting the site reads/writes this single bin via the key below.
const DEFAULT_BIN_ID = '6a0e0eaf6877513b27a5b109';
const DEFAULT_MASTER_KEY = '$2a$10$3LdSC.W4rO9MXs4nrcRCoeg9GvuYHiQ/94E3fgUpA7F27NJ9.8nIG';
let orgAuthed = false;

const ROOM_TYPES = [
  { v: 'master',   l: 'Master' },
  { v: 'king',     l: 'King' },
  { v: 'queen',    l: 'Queen' },
  { v: 'double',   l: 'Double' },
  { v: 'twin',     l: 'Twin' },
  { v: 'single',   l: 'Single' },
  { v: 'sofa-bed', l: 'Sofa bed' },
  { v: 'bunk',     l: 'Bunk' },
];

// ── State ────────────────────────────────────────────────────────────────────

let S = load();
let F = {}; // ephemeral form/modal state

function defaultData() {
  return { properties: [], members: [], bookings: [], weeklyBudgets: {}, propertyRatings: [], memberRatings: [], updatedAt: 0 };
}

function defaultUI() {
  return {
    view: 'landing',          // 'landing' | 'member' | 'organiser'
    memberId: null,
    memTab: 'bookings',       // 'bookings' | 'available' | 'houses' | 'calendar'
    memHouseWc: null,         // selected W/C in the houses tab (null = first week)
    memCalYM: null,           // YYYY-MM for calendar view (null = current month)
    orgTab: 'properties',     // 'properties' | 'budget' | 'members' | 'ratings' | 'send'
    modal: null,              // null | { type, data }
    expanded: null,           // expanded property id (organiser list)
    expandedBudgetWk: null,   // expanded W/C in budget tab
    budgetWcFilter: null,     // W/C filter for summary tiles (null = all)
    propView: 'name',         // 'name' (flat list) | 'wc' (grouped by week)
    orgWcExpanded: [],        // W/C keys expanded in the by-week properties view
    memExpandedWcs: null,     // null = all expanded; array of wc strings that are open
    sendPropId: null,
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return { ...defaultData(), ...defaultUI(), ...JSON.parse(raw) };
  } catch (_) {}
  return { ...defaultData(), ...defaultUI() };
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(S));
}

function set(updates) {
  const touchesData = SYNC_FIELDS.some(k => k in updates);
  if (touchesData) updates = { ...updates, updatedAt: Date.now() };
  S = { ...S, ...updates };
  save();
  if (touchesData) schedulePush();
  render();
}

// ── Helpers ──────────────────────────────────────────────────────────────────

const uid = () => Math.random().toString(36).slice(2, 10);

const prop  = id => S.properties.find(p => p.id === id);
const mem   = id => S.members.find(m => m.id === id);
const rtl   = v  => ROOM_TYPES.find(r => r.v === v)?.l || v;

function propBookings(pid)       { return S.bookings.filter(b => b.propertyId === pid); }
function memBookings(mid)        { return S.bookings.filter(b => b.memberId === mid); }
function roomBooking(pid, rid)   { return S.bookings.find(b => b.propertyId === pid && b.roomId === rid); }
function freeRooms(pid) {
  const p = prop(pid); if (!p) return [];
  const taken = S.bookings.filter(b => b.propertyId === pid).map(b => b.roomId);
  return p.rooms.filter(r => !taken.includes(r.id));
}

// ── Ratings ──────────────────────────────────────────────────────────────────
// Property ratings: one per (propertyId, raterId). Member ratings: one per
// (subjectId, raterId). Score is 1..5; comment is optional. Upsert in place.

function propRatingsFor(pid)        { return S.propertyRatings.filter(r => r.propertyId === pid); }
function propRatingByRater(pid, rid){ return S.propertyRatings.find(r => r.propertyId === pid && r.raterId === rid); }
function memRatingsOf(subjectId)    { return S.memberRatings.filter(r => r.subjectId === subjectId); }
function memRatingByRater(subjectId, raterId) { return S.memberRatings.find(r => r.subjectId === subjectId && r.raterId === raterId); }

function avg(scores) {
  if (!scores.length) return null;
  return scores.reduce((a, b) => a + b, 0) / scores.length;
}

// Upsert a single rating into an array, matched by the given key fields.
// Returns the next array; caller decides when to commit via set().
function upsertRating(list, matchKeys, patch) {
  const i = list.findIndex(r => matchKeys.every(k => r[k] === patch[k]));
  const stamped = { ...patch, createdAt: Date.now() };
  if (i >= 0) return list.map((r, idx) => idx === i ? { ...r, ...stamped } : r);
  return [...list, { id: uid(), ...stamped }];
}

function starInput(name, currentVal) {
  const v = currentVal || 0;
  return `<div class="stars" data-name="${esc(name)}" data-val="${v}">${
    [1,2,3,4,5].map(i => `<span class="star ${i <= v ? 'on' : ''}" data-i="${i}" onclick="setStar(this)">&#9733;</span>`).join('')
  }</div>`;
}

function starsRO(score, count) {
  if (score == null) return `<span class="muted sm">Not rated yet</span>`;
  const full = Math.round(score);
  return `<span class="rating-score"><span class="stars ro">${
    [1,2,3,4,5].map(i => `<span class="star ${i <= full ? 'on' : ''}">&#9733;</span>`).join('')
  }</span><span class="num">${score.toFixed(1)}</span>${count != null ? `<span class="count">(${count})</span>` : ''}</span>`;
}

// Compact "★ 4.2" pill of a member's average received rating; empty if no
// ratings yet so the room-chip stays uncluttered.
function memRatingPill(memId) {
  const rs = memRatingsOf(memId);
  if (!rs.length) return '';
  const a = avg(rs.map(r => r.score));
  return `<div class="rc-rating" title="${rs.length} rating${rs.length===1?'':'s'}">&#9733; ${a.toFixed(1)}</div>`;
}

// Called from inline onclick on each star. Clicking the same star clears.
function setStar(el) {
  const wrap = el.closest('.stars');
  const val  = +el.dataset.i;
  const cur  = +wrap.dataset.val || 0;
  const next = cur === val ? 0 : val;
  wrap.dataset.val = next;
  wrap.querySelectorAll('.star').forEach((s, idx) => s.classList.toggle('on', idx < next));
}

function isoDate(d) {
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const day = String(d.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getMonday(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00Z'); // noon UTC — immune to DST
  const day = d.getUTCDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setUTCDate(d.getUTCDate() + diff);
  return isoDate(d);
}

function getMondays2026() {
  const mondays = [];
  const d = new Date('2026-01-01T12:00:00Z'); // noon UTC — immune to DST
  while (d.getUTCDay() !== 1) d.setUTCDate(d.getUTCDate() + 1);
  while (d.getUTCFullYear() === 2026) {
    mondays.push(isoDate(d));
    d.setUTCDate(d.getUTCDate() + 7);
  }
  return mondays;
}

function propWc(p) {
  return p.wc || getMonday(p.weekStart) || p.weekStart;
}

function wkNights(wk) {
  if (!wk.props.length) return 0;
  const arr = wk.props.map(p => {
    if (!p.weekStart || !p.weekEnd) return 0;
    return Math.max(0, Math.round((new Date(p.weekEnd + 'T00:00:00') - new Date(p.weekStart + 'T00:00:00')) / 86400000));
  });
  return Math.max(...arr, 0);
}

function weeks() {
  const map = {};
  S.properties.forEach(p => {
    const wc = propWc(p);
    if (!map[wc]) map[wc] = { wc, props: [] };
    map[wc].props.push(p);
  });
  return Object.values(map).sort((a, b) => a.wc.localeCompare(b.wc));
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function fmtShort(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function gbp(n) { return '£' + Number(n || 0).toLocaleString('en-GB', { maximumFractionDigits: 0 }); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Deterministic per-person tint so the same name always renders in the same
// colour wherever it appears. Tints avoid orange/red/green to stay clear of
// the brand and the avail/booked semantics.
const PERSON_PALETTE = [
  { bg: '#DBEAFE', fg: '#1E40AF' }, // blue
  { bg: '#EDE9FE', fg: '#5B21B6' }, // violet
  { bg: '#CCFBF1', fg: '#115E59' }, // teal
  { bg: '#FCE7F3', fg: '#9D174D' }, // pink
  { bg: '#FEF3C7', fg: '#92400E' }, // amber
  { bg: '#CFFAFE', fg: '#155E75' }, // cyan
  { bg: '#E0E7FF', fg: '#3730A3' }, // indigo
  { bg: '#FFE4E6', fg: '#9F1239' }, // rose
  { bg: '#F3E8FF', fg: '#6B21A8' }, // purple
  { bg: '#E2E8F0', fg: '#1E293B' }, // slate
];
function personColor(seed) {
  let h = 5381;
  const s = String(seed || '');
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return PERSON_PALETTE[Math.abs(h) % PERSON_PALETTE.length];
}

// ── CRUD ─────────────────────────────────────────────────────────────────────

function addProp(d)    { set({ properties: [...S.properties, { id: uid(), ...d }] }); }
function updProp(id,d) { set({ properties: S.properties.map(p => p.id === id ? { ...p, ...d } : p) }); }
function delProp(id) {
  if (!confirm('Delete this property and all its bookings?')) return;
  set({ properties: S.properties.filter(p => p.id !== id), bookings: S.bookings.filter(b => b.propertyId !== id) });
}

function addMem(d)    { set({ members: [...S.members, { id: uid(), ...d }] }); }
function updMem(id,d) { set({ members: S.members.map(m => m.id === id ? { ...m, ...d } : m) }); }
function delMem(id) {
  if (!confirm('Remove this member? Their bookings will also be removed.')) return;
  set({ members: S.members.filter(m => m.id !== id), bookings: S.bookings.filter(b => b.memberId !== id) });
}

function book(mid, pid, rid) {
  if (S.bookings.find(b => b.memberId === mid && b.propertyId === pid)) return;
  set({ bookings: [...S.bookings, { id: uid(), memberId: mid, propertyId: pid, roomId: rid, at: new Date().toISOString() }] });
}
function unbook(bid) {
  if (!confirm('Remove your booking for this property?')) return;
  set({ bookings: S.bookings.filter(b => b.id !== bid) });
}

// ── Sync (shared storage via JSONBin.io) ─────────────────────────────────────

let syncCfg = loadSyncCfg();
let syncState = {
  baseRemote: null,        // last server-confirmed snapshot, for three-way merge
  lastPushedJson: '',
  pushTimer: null,
  pollTimer: null,
  status: syncCfg.binId ? 'syncing' : 'local',
};

// Strip anything outside printable ASCII — HTTP headers must be ISO-8859-1,
// and pasted keys sometimes carry smart quotes or zero-width chars that
// crash fetch() with "String contains non ISO-8859-1 code point".
function sanitizeKey(s) {
  return (s || '').replace(/[^\x20-\x7E]/g, '').trim();
}

function loadSyncCfg() {
  try {
    const raw = localStorage.getItem(SYNC_LS_KEY);
    if (raw) {
      const cfg = JSON.parse(raw);
      cfg.masterKey = sanitizeKey(cfg.masterKey) || DEFAULT_MASTER_KEY;
      cfg.binId = cfg.binId || DEFAULT_BIN_ID;
      return cfg;
    }
  } catch (_) {}
  return { masterKey: DEFAULT_MASTER_KEY, binId: DEFAULT_BIN_ID };
}

function saveSyncCfg() {
  localStorage.setItem(SYNC_LS_KEY, JSON.stringify(syncCfg));
}

function syncDataSlice() {
  const out = {};
  SYNC_FIELDS.forEach(k => { out[k] = S[k]; });
  out.updatedAt = S.updatedAt || 0;
  return out;
}

function renderSyncPill() {
  const labels = {
    syncing: ['sync-syncing', 'Syncing…'],
    synced:  ['sync-synced',  'Live'],
    offline: ['sync-offline', 'Offline'],
    error:   ['sync-error',   'Sync error'],
    local:   ['sync-local',   'Local only'],
  };
  const key = syncCfg.binId ? syncState.status : 'local';
  const [cls, label] = labels[key] || labels.synced;
  const title = syncCfg.binId ? 'Shared bin: ' + syncCfg.binId : 'Data is local to this browser only';
  return `<span id="sync-pill" class="sync-pill ${cls}" title="${esc(title)}">${label}</span>`;
}

function setSyncStatus(s) {
  if (syncState.status === s) return;
  syncState.status = s;
  const el = document.getElementById('sync-pill');
  if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderSyncPill();
  el.replaceWith(tmp.firstElementChild);
}

function readShareHash() {
  const hash = location.hash.replace(/^#/, '');
  if (!hash) return null;
  const params = new URLSearchParams(hash);
  const binId = params.get('share');
  if (!binId) return null;
  return { binId, masterKey: sanitizeKey(params.get('key')) };
}

function setShareHash(binId, key) {
  const params = new URLSearchParams();
  params.set('share', binId);
  if (key) params.set('key', key);
  history.replaceState(null, '', '#' + params.toString());
}

async function createShareBin() {
  if (!syncCfg.masterKey) { alert('Paste your JSONBin Master Key first.'); return null; }
  setSyncStatus('syncing');
  try {
    const slice = { ...syncDataSlice(), updatedAt: Date.now() };
    const res = await fetch(SYNC_BASE, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': syncCfg.masterKey,
        'X-Bin-Private': 'false',
        'X-Bin-Name': 'Accommodation tracker — ' + new Date().toISOString().slice(0, 10),
      },
      body: JSON.stringify(slice),
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error('Could not create bin (' + res.status + '): ' + txt.slice(0, 200));
    }
    const j = await res.json();
    const id = j && j.metadata && j.metadata.id;
    if (!id) throw new Error('No bin id returned by JSONBin');
    syncCfg.binId = id;
    saveSyncCfg();
    syncState.lastPushedJson = JSON.stringify(slice);
    syncState.baseRemote = JSON.parse(JSON.stringify(slice));
    S = { ...S, updatedAt: slice.updatedAt };
    save();
    setShareHash(id, syncCfg.masterKey);
    startPolling();
    setSyncStatus('synced');
    return id;
  } catch (err) {
    setSyncStatus('error');
    alert('Could not create shared bin:\n\n' + err.message + '\n\nDouble-check the Master Key.');
    return null;
  }
}

async function pullRemote() {
  if (!syncCfg.binId) return;
  try {
    const headers = {};
    if (syncCfg.masterKey) headers['X-Master-Key'] = syncCfg.masterKey;
    const res = await fetch(SYNC_BASE + '/' + encodeURIComponent(syncCfg.binId) + '/latest', {
      headers, cache: 'no-store',
    });
    if (!res.ok) {
      if (res.status === 404) { setSyncStatus('error'); return; }
      throw new Error('HTTP ' + res.status);
    }
    const j = await res.json();
    const remote = j && j.record;
    if (!remote || typeof remote !== 'object') return;
    const firstPull = syncState.baseRemote === null;
    const localUpd  = S.updatedAt || 0;
    const remoteUpd = remote.updatedAt || 0;
    if (!S.modal && (firstPull || remoteUpd > localUpd)) {
      const next = { ...S };
      SYNC_FIELDS.forEach(k => { if (k in remote) next[k] = remote[k]; });
      next.updatedAt = remoteUpd;
      S = next;
      save();
      render();
    }
    syncState.baseRemote = JSON.parse(JSON.stringify(remote));
    setSyncStatus('synced');
  } catch (_err) {
    setSyncStatus('offline');
  }
}

function schedulePush() {
  if (!syncCfg.binId || !syncCfg.masterKey) return;
  clearTimeout(syncState.pushTimer);
  syncState.pushTimer = setTimeout(pushLocal, PUSH_DEBOUNCE_MS);
}

// Three-way merge: union by id, prefer local on conflict, drop deletions only
// when the deleted side actually had the item in the last-known base.
function mergeArrays(local, remote, base) {
  const byId = m => Object.fromEntries((m || []).map(x => [x.id, x]));
  const lMap = byId(local), rMap = byId(remote), bMap = byId(base);
  const out = {};
  const ids = new Set([...Object.keys(lMap), ...Object.keys(rMap)]);
  for (const id of ids) {
    const l = lMap[id], r = rMap[id], b = bMap[id];
    if (l && r) out[id] = l;
    else if (l && !r && !b) out[id] = l;
    else if (!l && r && !b) out[id] = r;
  }
  return Object.values(out);
}

async function pushLocal() {
  if (!syncCfg.binId || !syncCfg.masterKey) return;
  setSyncStatus('syncing');
  try {
    const preRes = await fetch(SYNC_BASE + '/' + encodeURIComponent(syncCfg.binId) + '/latest', {
      headers: { 'X-Master-Key': syncCfg.masterKey }, cache: 'no-store',
    });
    if (!preRes.ok) throw new Error('Pre-push GET HTTP ' + preRes.status);
    const remote = ((await preRes.json()) || {}).record || {};
    const base = syncState.baseRemote || {};

    let payload;
    if ((remote.updatedAt || 0) > (base.updatedAt || 0)) {
      payload = {
        properties: mergeArrays(S.properties, remote.properties, base.properties),
        members:    mergeArrays(S.members,    remote.members,    base.members),
        bookings:   mergeArrays(S.bookings,   remote.bookings,   base.bookings),
        propertyRatings: mergeArrays(S.propertyRatings, remote.propertyRatings, base.propertyRatings),
        memberRatings:   mergeArrays(S.memberRatings,   remote.memberRatings,   base.memberRatings),
        weeklyBudgets: { ...(remote.weeklyBudgets || {}), ...(S.weeklyBudgets || {}) },
        updatedAt: Date.now(),
      };
      S = { ...S, ...payload };
      save();
      render();
    } else {
      payload = { ...syncDataSlice(), updatedAt: Date.now() };
    }

    const putRes = await fetch(SYNC_BASE + '/' + encodeURIComponent(syncCfg.binId), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': syncCfg.masterKey },
      body: JSON.stringify(payload),
    });
    if (!putRes.ok) throw new Error('PUT HTTP ' + putRes.status);

    syncState.lastPushedJson = JSON.stringify(payload);
    syncState.baseRemote = JSON.parse(JSON.stringify(payload));
    setSyncStatus('synced');
  } catch (err) {
    setSyncStatus('error');
    console.warn('Sync push failed:', err);
  }
}

function startPolling() {
  if (syncState.pollTimer) clearInterval(syncState.pollTimer);
  syncState.pollTimer = setInterval(() => {
    if (document.hidden || S.modal) return;
    pullRemote();
  }, POLL_MS);
}

function initSync() {
  const fromHash = readShareHash();
  if (fromHash) {
    if (fromHash.binId !== syncCfg.binId) syncState.baseRemote = null;
    syncCfg = { binId: fromHash.binId, masterKey: fromHash.masterKey || syncCfg.masterKey };
    saveSyncCfg();
  }
  if (syncCfg.binId) {
    pullRemote().then(() => startPolling());
  }
}

function memCalView(m) {
  const today  = isoDate(new Date());
  const curYM  = S.memCalYM || today.slice(0, 7);
  const [year, month] = curYM.split('-').map(Number);

  const firstDay   = new Date(Date.UTC(year, month - 1, 1));
  const daysInMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
  let startDow = firstDay.getUTCDay();
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon = 0

  const bks = memBookings(m.id);
  const ranges = bks.map(b => {
    const p = prop(b.propertyId);
    return p ? { start: p.weekStart || '', end: p.weekEnd || '', name: p.name, bid: b.id, p } : null;
  }).filter(Boolean);

  const monthTitle = firstDay.toLocaleDateString('en-GB', { month: 'long', year: 'numeric', timeZone: 'UTC' });

  const DAY_HDRS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
    .map(d => `<div class="cal-hdr">${d}</div>`).join('');

  const blanks = Array(startDow).fill('<div class="cal-cell"></div>').join('');

  const cells = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const ds    = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday  = ds === today;
    const ranges_hit = ranges.filter(r => r.start <= ds && ds <= r.end);
    const booked     = ranges_hit.length > 0;
    const isStart    = ranges_hit.some(r => r.start === ds);
    const isEnd      = ranges_hit.some(r => r.end === ds);

    let rangeDiv = '';
    if (booked) {
      const cls = (isStart && isEnd) ? '' : isStart ? 'rs' : isEnd ? 're' : 'rm';
      if (cls) rangeDiv = `<div class="cal-range ${cls}"></div>`;
    }

    cells.push(`<div class="cal-cell ${booked?'booked':''} ${isToday?'is-today':''}">
      ${rangeDiv}
      <div class="cal-num">${d}</div>
    </div>`);
  }

  // Bookings that overlap this month
  const monthStart = `${curYM}-01`;
  const monthEnd   = `${curYM}-${String(daysInMonth).padStart(2,'0')}`;
  const monthBks   = bks.filter(b => {
    const p = prop(b.propertyId); if (!p) return false;
    return (p.weekStart || '') <= monthEnd && (p.weekEnd || '') >= monthStart;
  });

  const bookingList = !monthBks.length
    ? `<div class="sm muted" style="padding:16px 0;text-align:center;">No bookings this month</div>`
    : monthBks.map(b => {
        const p = prop(b.propertyId); if (!p) return '';
        const room = p.rooms.find(r => r.id === b.roomId);
        const others = propBookings(p.id).filter(x => x.memberId !== m.id).map(x => mem(x.memberId)?.name).filter(Boolean);
        return `<div class="cal-bk-item">
          <div class="cal-bk-bar"></div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:14px;margin-bottom:3px;">${esc(p.name)}</div>
            <div class="sm muted">${fmtShort(p.weekStart)} &ndash; ${fmtShort(p.weekEnd)} &bull; ${esc(p.location)}</div>
            ${room ? `<div class="sm" style="color:var(--orange);margin-top:2px;">${esc(room.name)} &bull; ${rtl(room.type)}</div>` : ''}
            ${others.length ? `<div class="sm muted" style="margin-top:2px;">With: ${others.map(esc).join(', ')}</div>` : ''}
          </div>
          <div class="flex g6" style="flex-shrink:0;">
            ${p.listingLink ? `<a class="btn btn-outline btn-sm" href="${esc(p.listingLink)}" target="_blank" rel="noopener">Listing</a>` : ''}
            <button class="btn btn-outline btn-sm" data-a="add-to-cal" data-bid="${b.id}">&#128197;</button>
          </div>
        </div>`;
      }).join('');

  return `
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="btn btn-ghost btn-sm" data-a="cal-prev">&#8592;</button>
        <div class="cal-title">${monthTitle}</div>
        <button class="btn btn-ghost btn-sm" data-a="cal-next">&#8594;</button>
      </div>
      <div class="cal-grid">
        ${DAY_HDRS}
        ${blanks}
        ${cells.join('')}
      </div>
    </div>
    <div class="cal-bk-list">
      <div class="sec-title" style="margin-bottom:4px;">Bookings this month</div>
      ${bookingList}
    </div>`;
}

// Properties tab
function orgProps() {
  const byName = S.propView !== 'wc';

  const toggle = `<div class="flex g4" style="border:1px solid var(--border);border-radius:4px;padding:3px;">
    <button class="btn btn-xs ${byName?'btn-primary':'btn-ghost'}" data-a="prop-view" data-view="name" style="padding:4px 10px;">By name</button>
    <button class="btn btn-xs ${!byName?'btn-primary':'btn-ghost'}" data-a="prop-view" data-view="wc" style="padding:4px 10px;">By week</button>
  </div>`;

  const toolbar = `<div class="fb mb16">
    <div class="flex g8">
      ${toggle}
      <button class="btn btn-outline" data-a="import-excel">&#8593; Import from Excel</button>
      <button class="btn btn-outline" data-a="download-sample">&#8595; Download sample</button>
    </div>
    <button class="btn btn-primary" data-a="open-add-prop">+ Add property</button>
  </div>`;

  if (!S.properties.length) return toolbar + `<div class="empty"><div class="empty-title">No properties added yet</div><div class="sm muted">Add your first property to get started.</div></div>`;

  if (byName) {
    const sorted = [...S.properties].sort((a, b) => a.name.localeCompare(b.name));
    return toolbar + sorted.map(p => orgPropCard(p)).join('');
  }

  // Group by W/C
  const today = isoDate(new Date());
  const wcMap = {};
  S.properties.forEach(p => {
    const wc = propWc(p);
    if (!wcMap[wc]) wcMap[wc] = [];
    wcMap[wc].push(p);
  });
  const currentWcs = Object.keys(wcMap).filter(wc => wc >= today).sort();
  const pastWcs    = Object.keys(wcMap).filter(wc => wc < today).sort();

  const orgWcOpen = wc => (S.orgWcExpanded || []).includes(wc);
  const renderGroup = (wc, past) => {
    const props = wcMap[wc];
    const totalBooked = props.reduce((s, p) => s + propBookings(p.id).length, 0);
    const totalRooms  = props.reduce((s, p) => s + p.rooms.length, 0);
    const open = orgWcOpen(wc);
    return `<div style="${past ? 'opacity:0.5;' : ''}margin-bottom:8px;">
      <div class="wk-hdr" style="cursor:pointer;margin-bottom:${open?'10px':'0'};" data-a="org-prop-toggle-wc" data-wc="${wc}">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;font-weight:600;">W/C ${fmtDate(wc)}</span>
          ${past ? `<span class="badge b-grey" style="font-size:10px;">Past</span>` : ''}
          <span class="badge b-grey">${props.length} propert${props.length!==1?'ies':'y'}</span>
          <span class="badge ${totalBooked===0?'b-grey':totalBooked<totalRooms?'b-orange':'b-green'}">${totalBooked}/${totalRooms} booked</span>
        </div>
        <span style="color:var(--text-muted);font-size:13px;">${open?'&#9650;':'&#9660;'}</span>
      </div>
      ${open ? props.map(p => orgPropCard(p)).join('') : ''}
    </div>`;
  };

  return toolbar
    + currentWcs.map(wc => renderGroup(wc, false)).join('')
    + (pastWcs.length ? `<div class="sec-title" style="margin-top:8px;color:var(--text-muted);">Past weeks</div>` + pastWcs.map(wc => renderGroup(wc, true)).join('') : '');
}

// Budget tab
function orgBudget() {
  const wks      = weeks();

  const wkData = wks.map(wk => {
    const signups    = S.bookings.filter(b => wk.props.some(p => p.id === b.propertyId)).length;
    const cap        = wk.props.reduce((s, p) => s + p.rooms.length, 0);
    const nights     = wkNights(wk);
    const effNights  = Math.min(nights, 3);
    const entitlement = 175 * signups * effNights;
    const cost       = wk.props.reduce((s, p) => s + (Number(p.totalPrice) || 0), 0);
    return { wk, signups, cap, nights, effNights, entitlement, cost };
  });

  // Summary tiles — scoped to selected W/C filter or all weeks
  const filtered = S.budgetWcFilter ? wkData.filter(d => d.wk.wc === S.budgetWcFilter) : wkData;
  const tileProps    = S.budgetWcFilter ? S.properties.filter(p => propWc(p) === S.budgetWcFilter) : S.properties;
  const tileCost     = filtered.reduce((s, d) => s + d.cost, 0);
  const tileEnt      = filtered.reduce((s, d) => s + d.entitlement, 0);
  const tileLeft     = tileEnt - tileCost;
  const tileEntOverSpendPct = tileCost > 0 ? Math.round(tileEnt / tileCost * 100) : null;
  const tileSignups  = filtered.reduce((s, d) => s + d.signups, 0);
  const tileCap      = filtered.reduce((s, d) => s + d.cap, 0);
  const tileOccPct   = tileCap > 0 ? Math.round(tileSignups / tileCap * 100) : 0;

  const filterOpts = wks.map(wk =>
    `<option value="${wk.wc}" ${S.budgetWcFilter===wk.wc?'selected':''}>W/C ${fmtDate(wk.wc)}</option>`
  ).join('');

  return `
  <div class="fb mb16" style="align-items:center;">
    <div class="sm" style="font-weight:600;color:var(--text-muted);">Filter by week</div>
    <select data-a="budget-wc-filter" style="min-width:200px;">
      <option value="">All weeks</option>
      ${filterOpts}
    </select>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Total entitlement</div><div class="stat-val">${gbp(tileEnt)}</div><div class="stat-hint">£175 × people × nights (max 3)</div></div>
    <div class="stat"><div class="stat-lbl">Committed spend</div><div class="stat-val" style="color:var(--orange)">${gbp(tileCost)}</div><div class="stat-hint">${tileProps.length} propert${tileProps.length!==1?'ies':'y'}</div></div>
<div class="stat"><div class="stat-lbl">Entitlement vs spend</div><div class="stat-val" style="color:${tileEntOverSpendPct===null?'inherit':tileEntOverSpendPct<100?'var(--danger)':tileEntOverSpendPct<120?'var(--orange)':'var(--success)'}">${tileEntOverSpendPct===null?'—':tileEntOverSpendPct+'%'}</div><div class="stat-hint">${gbp(tileEnt)} entitlement / ${gbp(tileCost)} spend</div></div>
    <div class="stat"><div class="stat-lbl">Beds occupied</div><div class="stat-val">${tileSignups}<span style="font-size:16px;font-weight:400;color:var(--text-muted)"> / ${tileCap}</span></div><div class="stat-hint">${tileOccPct}% occupancy</div></div>
  </div>

  <div class="card" style="margin-bottom:20px;padding:20px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:16px;">Spend vs entitlement — 19-week view</div>
    <div style="position:relative;height:300px;">
      <canvas id="budget-chart"></canvas>
    </div>
  </div>

  <div class="sec-title">Weekly breakdown</div>
  ${!wks.length ? `<div class="empty"><div class="empty-title">No properties added yet</div><div class="sm muted">Add properties with a W/C date to see the weekly budget breakdown.</div></div>` :
    wkData.map(({ wk, signups, cap, nights, effNights, entitlement, cost }) => {
      const left   = entitlement - cost;
      const pct    = cost > 0 ? Math.min(100, entitlement / cost * 100) : 0;
      const exp    = S.expandedBudgetWk === wk.wc;
      const occPct = cap > 0 ? (signups / cap * 100) : 0;
      return `<div class="wk-row">
        <div class="wk-hdr" style="cursor:pointer;" data-a="toggle-budget-wk" data-wc="${wk.wc}">
          <div>
            <div class="wk-lbl">W/C ${fmtDate(wk.wc)}</div>
            <div class="sm muted mt8">${nights} night${nights!==1?'s':''} &bull; ${signups} signed up &bull; Entitlement: <strong>${gbp(entitlement)}</strong></div>
          </div>
          <div class="flex g8" style="align-items:center;">
            <span class="badge b-grey">${wk.props.length} propert${wk.props.length!==1?'ies':'y'}</span>
            <span class="badge ${signups===0?'b-grey':signups<cap?'b-orange':'b-green'}">${signups}/${cap}</span>
            <span style="color:var(--text-muted);font-size:13px;">${exp?'&#9650;':'&#9660;'}</span>
          </div>
        </div>
        <div class="wk-meta mt8">
          <span>Entitlement: ${gbp(entitlement)} &nbsp;<span class="muted">(£175 &times; ${signups} &times; ${effNights} night${effNights!==1?'s':''})</span></span>
          <span>Property cost: ${gbp(cost)}</span>
          <span style="color:${left<0?'var(--danger)':'var(--success)'};">${left>=0?'Under by '+gbp(left):'Over by '+gbp(-left)}</span>
          ${signups&&cost?`<span>Cost per person: ${gbp(cost/signups)}</span>`:''}
        </div>
        ${entitlement>0||cost>0 ? `<div class="prog mt8"><div class="prog-fill ${pct>=100?'pf-green':pct>=75?'':'pf-red'}" style="width:${Math.min(pct,100)}%"></div></div>` : ''}
        ${exp ? `
          <hr class="divider">
          <div style="font-size:12px;font-weight:600;margin-bottom:10px;">Properties this week</div>
          ${!wk.props.length ? `<div class="sm muted">No properties assigned to this week.</div>` :
            wk.props.map(p => {
              const pb = propBookings(p.id).length;
              return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
                <div>
                  <div style="font-weight:600;font-size:13px;">${esc(p.name)}</div>
                  <div class="sm muted">${esc(p.location)} &bull; ${fmtShort(p.weekStart)}&ndash;${fmtShort(p.weekEnd)} &bull; ${gbp(p.totalPrice)} &bull; ${pb}/${p.rooms.length} booked</div>
                </div>
                <div class="flex g6">
                  ${p.listingLink?`<a class="btn btn-outline btn-xs" href="${esc(p.listingLink)}" target="_blank" rel="noopener">Listing</a>`:''}
                  <button class="btn btn-outline btn-xs" data-a="open-edit-prop" data-pid="${p.id}">Edit</button>
                </div>
              </div>`;
            }).join('')}
        ` : ''}
      </div>`;
    }).join('')}`;
}

// Ratings tab — per-member and per-property aggregates with recent comments
function orgRatings() {
  const fmtTs = ts => {
    if (!ts) return '';
    const d = new Date(ts);
    return `${String(d.getDate()).padStart(2,'0')} ${d.toLocaleString('en-GB',{month:'short'})} ${d.getFullYear()}`;
  };

  // Members: rank by avg desc, then count desc, then name
  const memberRows = S.members
    .map(m => {
      const rs = memRatingsOf(m.id);
      const a = avg(rs.map(r => r.score));
      return { m, ratings: rs, average: a, count: rs.length };
    })
    .sort((x, y) => (y.average || 0) - (x.average || 0) || y.count - x.count || x.m.name.localeCompare(y.m.name));

  const memberSection = !S.members.length
    ? `<div class="sm muted">No members yet.</div>`
    : memberRows.map(({ m, ratings, average, count }) => {
        const c = personColor(m.name);
        const sorted = [...ratings].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        return `<div class="mem-row" style="flex-direction:column;align-items:stretch;gap:8px;">
          <div class="fb" style="gap:12px;">
            <div style="flex:1;min-width:0;">
              <div class="mem-name" style="color:${c.fg};">${esc(m.name)}</div>
              <div class="mem-email">${esc(m.email || 'No email')}</div>
            </div>
            <div>${starsRO(average, count)}</div>
          </div>
          ${sorted.length ? `<div class="rating-comments">${sorted.map(r => {
            const rater = mem(r.raterId);
            const rc = rater ? personColor(rater.name) : null;
            return `<div class="rating-comment">
              ${r.comment ? esc(r.comment) : '<span class="muted">No comment</span>'}
              <div class="rc-meta">${starsRO(r.score, null)} &middot; by <span style="color:${rc?rc.fg:'inherit'};font-weight:600;">${esc(rater?.name || 'Unknown')}</span> &middot; ${fmtTs(r.createdAt)}</div>
            </div>`;
          }).join('')}</div>` : ''}
        </div>`;
      }).join('');

  // Properties: only those with any ratings, ranked by avg desc
  const propRows = S.properties
    .map(p => {
      const rs = propRatingsFor(p.id);
      const a = avg(rs.map(r => r.score));
      return { p, ratings: rs, average: a, count: rs.length };
    })
    .filter(x => x.count > 0)
    .sort((x, y) => (y.average || 0) - (x.average || 0) || y.count - x.count || x.p.name.localeCompare(y.p.name));

  const propSection = !propRows.length
    ? `<div class="sm muted">No property ratings yet.</div>`
    : propRows.map(({ p, ratings, average, count }) => {
        const sorted = [...ratings].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        return `<div class="mem-row" style="flex-direction:column;align-items:stretch;gap:8px;">
          <div class="fb" style="gap:12px;">
            <div style="flex:1;min-width:0;">
              <div class="mem-name">${esc(p.name)}</div>
              <div class="mem-email">${esc(p.location || '')} &middot; ${fmtShort(p.weekStart)} &ndash; ${fmtShort(p.weekEnd)}</div>
            </div>
            <div>${starsRO(average, count)}</div>
          </div>
          <div class="rating-comments">${sorted.map(r => {
            const rater = mem(r.raterId);
            const rc = rater ? personColor(rater.name) : null;
            return `<div class="rating-comment">
              ${r.comment ? esc(r.comment) : '<span class="muted">No comment</span>'}
              <div class="rc-meta">${starsRO(r.score, null)} &middot; by <span style="color:${rc?rc.fg:'inherit'};font-weight:600;">${esc(rater?.name || 'Unknown')}</span> &middot; ${fmtTs(r.createdAt)}</div>
            </div>`;
          }).join('')}</div>
        </div>`;
      }).join('');

  return `
    <div class="card">
      <div class="card-hdr"><div><div class="card-title">Member ratings</div><div class="card-sub">Average score and feedback each member has received from housemates</div></div></div>
      ${memberSection}
    </div>
    <div class="card" style="margin-top:14px;">
      <div class="card-hdr"><div><div class="card-title">Property ratings</div><div class="card-sub">How team members rated each accommodation</div></div></div>
      ${propSection}
    </div>`;
}

  const bks = propBookings(selId);
  const booked = bks.map(b => ({ m: mem(b.memberId), r: p.rooms.find(x=>x.id===b.roomId) })).filter(x=>x.m);
  const emailBody = genEmail(p, booked);

// ── Calendar export ───────────────────────────────────────────────────────────

function downloadIcs(bid) {
  const b = S.bookings.find(x => x.id === bid); if (!b) return;
  const p = prop(b.propertyId); if (!p) return;
  const room   = p.rooms.find(r => r.id === b.roomId);
  const others = propBookings(p.id).filter(x => x.memberId !== b.memberId).map(x => mem(x.memberId)?.name).filter(Boolean);

  // DTEND for all-day events is exclusive (day after last night)
  const endD = new Date(p.weekEnd + 'T12:00:00Z');
  endD.setUTCDate(endD.getUTCDate() + 1);
  const dtStart = (p.weekStart || '').replace(/-/g, '');
  const dtEnd   = isoDate(endD).replace(/-/g, '');
  const stamp   = new Date().toISOString().replace(/[-:.]/g, '').slice(0, 15) + 'Z';

  const descLines = [
    room   ? `Room: ${room.name} (${rtl(room.type)})` : '',
    others.length ? `Staying with: ${others.join(', ')}` : '',
    p.notes       ? `Notes: ${p.notes}` : '',
    p.listingLink ? `Listing: ${p.listingLink}` : '',
  ].filter(Boolean).join('\\n');

  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Newton//Accommodation Tracker//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:accom-${b.id}@newton`,
    `DTSTAMP:${stamp}`,
    `DTSTART;VALUE=DATE:${dtStart}`,
    `DTEND;VALUE=DATE:${dtEnd}`,
    `SUMMARY:🏠 ${p.name} — BAE Air`,
    `LOCATION:${p.location || ''}`,
    descLines ? `DESCRIPTION:${descLines}` : '',
    p.listingLink ? `URL:${p.listingLink}` : '',
    'END:VEVENT',
    'END:VCALENDAR',
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([lines], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${p.name.replace(/[^a-z0-9]/gi, '_')}_accommodation.ics`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Budget chart ─────────────────────────────────────────────────────────────

let _budgetChart = null;

function renderBudgetChart() {
  const canvas = document.getElementById('budget-chart');
  if (!canvas || typeof Chart === 'undefined') return;

  // 19-week window: 6 back, current, 12 forward
  const todayMon = getMonday(isoDate(new Date()));
  const start = new Date(todayMon + 'T12:00:00Z');
  start.setUTCDate(start.getUTCDate() - 6 * 7);

  const weekKeys = [], weekLabels = [];
  for (let i = 0; i < 19; i++) {
    const k = isoDate(start);
    weekKeys.push(k);
    weekLabels.push(fmtShort(k));
    start.setUTCDate(start.getUTCDate() + 7);
  }

  // Build per-week computed values
  const wkMap = {};
  weeks().forEach(wk => {
    const signups    = S.bookings.filter(b => wk.props.some(p => p.id === b.propertyId)).length;
    const effNights  = Math.min(wkNights(wk), 3);
    const entitlement = 175 * signups * effNights;
    const cost       = wk.props.reduce((s, p) => s + (Number(p.totalPrice) || 0), 0);
    wkMap[wk.wc] = { entitlement, cost };
  });

  const todayIdx  = weekKeys.indexOf(todayMon);
  const spendData = weekKeys.map(k => wkMap[k]?.cost        ?? null);
  const entData   = weekKeys.map(k => wkMap[k]?.entitlement ?? null);

  // Inline plugin: vertical dashed line on current week
  const nowLinePlugin = {
    id: 'nowLine',
    afterDraw(chart) {
      if (todayIdx === -1) return;
      const meta = chart.getDatasetMeta(0);
      const pt   = meta.data[todayIdx];
      if (!pt) return;
      const { ctx, chartArea: { top, bottom } } = chart;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(pt.x, top);
      ctx.lineTo(pt.x, bottom);
      ctx.strokeStyle = 'rgba(255,98,35,0.45)';
      ctx.lineWidth   = 2;
      ctx.setLineDash([5, 4]);
      ctx.stroke();
      ctx.restore();
    }
  };

  if (_budgetChart) { _budgetChart.destroy(); _budgetChart = null; }

  _budgetChart = new Chart(canvas, {
    type: 'line',
    plugins: [nowLinePlugin],
    data: {
      labels: weekLabels,
      datasets: [
        {
          label: 'Entitlement',
          data: entData,
          borderColor: '#282D37',
          backgroundColor: 'rgba(40,45,55,0.06)',
          borderDash: [6, 3],
          tension: 0.4,
          pointRadius: weekKeys.map((k, i) => i === todayIdx ? 6 : 3),
          pointHoverRadius: 7,
          fill: false,
          spanGaps: true,
        },
        {
          label: 'Committed spend',
          data: spendData,
          borderColor: '#FF6223',
          backgroundColor: 'rgba(255,98,35,0.08)',
          tension: 0.4,
          pointRadius: weekKeys.map((k, i) => i === todayIdx ? 6 : 3),
          pointHoverRadius: 7,
          fill: true,
          spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { family: 'Aptos, system-ui, sans-serif', size: 12 }, padding: 20, usePointStyle: true },
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: £${Number(ctx.raw ?? 0).toLocaleString('en-GB', { maximumFractionDigits: 0 })}`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { family: 'Aptos, system-ui, sans-serif', size: 11 }, maxRotation: 45 },
        },
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: {
            font: { family: 'Aptos, system-ui, sans-serif', size: 11 },
            callback: v => '£' + Number(v).toLocaleString('en-GB', { maximumFractionDigits: 0 }),
          },
        },
      },
    },
  });
}
